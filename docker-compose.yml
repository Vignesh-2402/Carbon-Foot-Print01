version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: carbon_footprint_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: carbon_footprint
    volumes:
      - mongodb_data:/data/db
    networks:
      - carbon-network

  backend:
    build: ./server
    container_name: carbon_footprint_api
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/carbon_footprint?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
    networks:
      - carbon-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  carbon-network:
    driver: bridge
